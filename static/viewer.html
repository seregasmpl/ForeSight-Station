<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФОРСАЙТ-СТАНЦИЯ — НАБЛЮДЕНИЕ</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
    <div class="stars"></div>

    <!-- No PIN needed — viewer mode -->
    <div id="dashboard" class="dashboard">
        <header class="admin-header">
            <h1>НАБЛЮДАТЕЛЬНЫЙ ПУНКТ</h1>
            <span style="font-size:0.65rem;color:var(--text-dim)">Авто-обновление каждые 5 сек</span>
        </header>

        <div class="sessions-grid" id="sessions-grid"></div>

        <div id="session-detail" class="session-detail" style="display:none">
            <div class="detail-header">
                <h2 id="detail-title">---</h2>
                <button class="retro-btn small" onclick="closeDetail()">ЗАКРЫТЬ</button>
            </div>
            <div id="detail-history" class="detail-history"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        // Auto-start viewer mode (no login needed)
        refreshDashboard();
        setInterval(refreshDashboard, 5000);
    </script>
</body>
</html>
